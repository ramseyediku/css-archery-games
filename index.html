<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="src/IMG/target.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Archery Game</title>
    <link lang="sass" rel="stylesheet" href="src/SCSS/main.scss" />
  </head>
  <body>
    <form method="get" action="" class="console">
      <input type="radio" name="screen" id="screen-1" checked />
      <input type="radio" name="screen" id="screen-2" />
      <input type="radio" name="screen" id="screen-3" />

      <section class="console__screen console__screen--screen-1">
        <div>
          <h1 class="title">CSS Archery <br /><span>Game</span></h1>
          <label class="button" for="screen-2">Start</label>
        </div>
      </section>

      <section class="console__screen console__screen--screen-2">
        <div class="console__screen__game">
          <input type="radio" class="target" tabindex="-1" />
          <input type="radio" class="target" tabindex="-1" />
          <input type="radio" class="target" tabindex="-1" />
          <input type="radio" class="target" tabindex="-1" />
          <input type="radio" class="target" tabindex="-1" />
          <input type="radio" class="target" tabindex="-1" />
          <input type="radio" class="target" tabindex="-1" />
        </div>
      </section>

      <section class="console__screen console__screen--screen-3">
        <div>
          <!-- <div class="score"><br />Play again?</div> -->
          <h1 class="title score"><br /><span>Play again?</span></h1>
          <button class="button" type="submit">Play!</button>
        </div>
      </section>
    </form>
  </body>
</html>
